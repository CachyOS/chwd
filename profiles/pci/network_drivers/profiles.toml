[broadcom-wl]
desc = 'Broadcom 802.11 Linux STA wireless driver'
class_ids = "0200 0280 0282"
vendor_ids = "14E4 14A4"
device_ids = "4311 4312 4315 4727 4328 4329 432A 432B 432C 432D 0576 4353 4357 4358 4359 4365 4331 43B1 43A0 4360"
priority = 1
packages = 'broadcom-wl-dkms linux-firmware-broadcom'
post_install = """
    cat <<EOF >/etc/modprobe.d/01-chwd-net-blacklist.conf
# Do not load modules on boot.
blacklist b43
blacklist b43legacy
blacklist ssb
blacklist bcm43xx
blacklist brcm80211
blacklist brcmfmac
blacklist brcmsmac
blacklist bcma
EOF
    mkinitcpio -P
"""
post_remove = """
    rm -f /etc/modprobe.d/01-chwd-net-blacklist.conf
    mkinitcpio -P
"""

[marvell-wifi]
desc = 'Marvell AVASTAR 802.11ac Wireless (88W8897) firmware'
class_ids = "0200 0280"
vendor_ids = "11AB"
device_ids = "*"
priority = 1
packages = 'linux-firmware-marvell'

[realtek-r8125.asus-g733zw]
desc = 'ASUS ROG Strix G733ZW Realtek RTL8125 2.5GbE driver'
class_ids = "0200"
vendor_ids = "10ec"
device_ids = "8125"
hwd_product_name_pattern = '^ROG Strix G733ZW_G733ZW$'
priority = 2
packages = 'linux-cachyos-r8125 linux-cachyos-lts-r8125'
post_install = """
    found_r8125=""
    for candidate in /sys/bus/pci/devices/*; do
        [ -e "$candidate/vendor" ] || continue
        [ "$(cat "$candidate/vendor")" = "0x10ec" ] || continue
        [ "$(cat "$candidate/device")" = "0x8125" ] || continue
        [ "$(cat "$candidate/subsystem_vendor")" = "0x1043" ] || continue
        [ "$(cat "$candidate/subsystem_device")" = "0x205f" ] || continue
        found_r8125="$candidate"
        break
    done

    if [ -z "$found_r8125" ]; then
        echo "ASUS G733ZW RTL8125 with subsystem 1043:205f not found; skipping r8125 config."
        exit 0
    fi

    cat <<EOF >/etc/modprobe.d/99-realtek-r8125.conf
# This file is automatically generated by chwd. PLEASE DO NOT EDIT IT.
#
# ASUS ROG Strix G733ZW: prefer the Realtek r8125 vendor module for the
# onboard RTL8125 2.5GbE controller instead of the generic r8169 module.
blacklist r8169
softdep r8169 pre: r8125
EOF
    mkinitcpio -P
"""
post_remove = """
    rm -f /etc/modprobe.d/99-realtek-r8125.conf
    mkinitcpio -P
"""
