[asus-g733zw-alc285-audio]
desc = 'ASUS ROG Strix G733ZW ALC285 speaker routing fix'
class_ids = "0403"
vendor_ids = "8086"
device_ids = "51c8"
hwd_product_name_pattern = '^ROG Strix G733ZW_G733ZW$'
priority = 6
packages = 'alsa-tools alsa-utils'
post_install = """
    echo "ASUS G733ZW ALC285 chwd installing..."

    codec_file=""
    for candidate in /proc/asound/card*/codec#*; do
        [ -e "$candidate" ] || continue
        if grep -q '^Codec: Realtek ALC285$' "$candidate" && \
           grep -q '^Subsystem Id: 0x104312bf$' "$candidate"; then
            codec_file="$candidate"
            break
        fi
    done

    if [ -z "$codec_file" ]; then
        echo "ASUS G733ZW ALC285 codec with subsystem 1043:12bf not found; skipping audio fix."
        exit 0
    fi

    mkdir -p /etc/wireplumber/wireplumber.conf.d
    cat <<'EOF' >/etc/wireplumber/wireplumber.conf.d/51-alc285-soft-mixer.conf
monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3"
      }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
      }
    }
  }
]
EOF

    install -Dm755 /dev/stdin /usr/local/sbin/g733zw-audio-live-fix <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

codec_file=""
for candidate in /proc/asound/card*/codec#*; do
    [ -e "$candidate" ] || continue
    if grep -q '^Codec: Realtek ALC285$' "$candidate" && \
       grep -q '^Subsystem Id: 0x104312bf$' "$candidate"; then
        codec_file="$candidate"
        break
    fi
done

if [ -z "$codec_file" ]; then
    echo "ASUS G733ZW ALC285 codec with subsystem 1043:12bf not found; skipping audio fix."
    exit 0
fi

codec_card="${codec_file#/proc/asound/card}"
codec_card="${codec_card%%/*}"
hwdev="/dev/snd/hwC${codec_card}D0"

[ -e "$hwdev" ] || exit 0

amixer -c"${codec_card}" set Master 100% unmute || true
amixer -c"${codec_card}" set PCM 100% || true
if amixer -c"${codec_card}" scontrols | grep -q "'Speaker Front'"; then
    amixer -c"${codec_card}" set 'Speaker Front' 100% unmute || true
else
    amixer -c"${codec_card}" set Speaker 100% unmute || true
fi
amixer -c"${codec_card}" set Headphone 100% mute || true

hda-verb "$hwdev" 0x17 SET_CONNECT_SEL 0x00
hda-verb "$hwdev" 0x14 SET_PIN_WIDGET_CONTROL 0x40
hda-verb "$hwdev" 0x14 SET_EAPD_BTLENABLE 0x02
hda-verb "$hwdev" 0x14 SET_AMP_GAIN_MUTE 0xb000
hda-verb "$hwdev" 0x1e SET_PIN_WIDGET_CONTROL 0x40
hda-verb "$hwdev" 0x16 SET_PIN_WIDGET_CONTROL 0x00
hda-verb "$hwdev" 0x1b SET_PIN_WIDGET_CONTROL 0x00
EOF

    install -Dm644 /dev/stdin /etc/systemd/system/g733zw-audio-live-fix.service <<'EOF'
[Unit]
Description=Apply ASUS G733ZW ALC285 live speaker routing fix
After=sound.target
ConditionPathExistsGlob=/proc/asound/card*/codec#*

[Service]
Type=oneshot
ExecStart=/usr/local/sbin/g733zw-audio-live-fix

EOF

    install -Dm644 /dev/stdin /etc/systemd/system/g733zw-audio-live-fix.timer <<'EOF'
[Unit]
Description=Delay ASUS G733ZW ALC285 live speaker routing fix until desktop audio is up

[Timer]
OnBootSec=45s
Unit=g733zw-audio-live-fix.service

[Install]
WantedBy=timers.target
EOF

    cat <<'EOF' >/etc/modprobe.d/99-g733zw-audio-powersave.conf
# This file is automatically generated by chwd. PLEASE DO NOT EDIT IT.
#
# ASUS G733ZW ALC285 speaker routing uses runtime HDA verbs.
# Keep the codec powered so the runtime pin/EAPD state is not lost after idle.
options snd_hda_intel power_save=0
EOF
    if [ -w /sys/module/snd_hda_intel/parameters/power_save ]; then
        echo 0 >/sys/module/snd_hda_intel/parameters/power_save
    fi

    install -Dm755 /dev/stdin /usr/lib/systemd/system-sleep/g733zw-audio-live-fix <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

case "${1:-}" in
  post)
    /usr/bin/sleep 2
    /usr/local/sbin/g733zw-audio-live-fix
    ;;
esac
EOF

    install -Dm644 /dev/stdin /etc/systemd/system/g733zw-audio-profile-change-fix.service <<'EOF'
[Unit]
Description=Re-apply ASUS G733ZW audio routing after platform profile changes
After=sound.target
ConditionPathExists=/sys/firmware/acpi/platform_profile

[Service]
Type=oneshot
ExecStart=/usr/bin/bash -lc '/usr/bin/sleep 1; /usr/local/sbin/g733zw-audio-live-fix'
EOF

    install -Dm644 /dev/stdin /etc/systemd/system/g733zw-audio-profile-change-fix.path <<'EOF'
[Unit]
Description=Watch platform profile changes and restore ASUS G733ZW audio routing

[Path]
PathModified=/sys/firmware/acpi/platform_profile
Unit=g733zw-audio-profile-change-fix.service

[Install]
WantedBy=multi-user.target
EOF

    systemctl daemon-reload
    systemctl disable g733zw-audio-live-fix.service || true
    systemctl enable --now g733zw-audio-live-fix.timer
    systemctl enable --now g733zw-audio-profile-change-fix.path
"""
post_remove = """
    echo "ASUS G733ZW ALC285 chwd removing..."
    systemctl disable --now g733zw-audio-live-fix.service || true
    systemctl disable --now g733zw-audio-live-fix.timer || true
    systemctl disable --now g733zw-audio-profile-change-fix.path || true
    rm -f /etc/systemd/system/g733zw-audio-profile-change-fix.path
    rm -f /etc/systemd/system/g733zw-audio-profile-change-fix.service
    rm -f /etc/systemd/system/g733zw-audio-live-fix.service
    rm -f /etc/systemd/system/g733zw-audio-live-fix.timer
    rm -f /usr/local/sbin/g733zw-audio-live-fix
    rm -f /usr/lib/systemd/system-sleep/g733zw-audio-live-fix
    rm -f /etc/modprobe.d/99-g733zw-audio-powersave.conf
    rm -f /etc/wireplumber/wireplumber.conf.d/51-alc285-soft-mixer.conf
    systemctl daemon-reload
"""
